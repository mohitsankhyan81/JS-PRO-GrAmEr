<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <h1>Node.insertBefore() JS DOM</h1>

  <ul id="mylist">
    <li>Apple</li>
    <li id="pearsItem">Mango</li>
    <li>Banana</li>
  </ul>
  <script>
    let mylist=document.getElementById('mylist');
    let pearsItem=document.getElementById('pearsItem');

    const orangeitem=document.createElement('li');
    orangeitem.textContent='Orange';
    mylist.insertBefore(orangeitem,pearsItem);
    
    console.log(mylist);
    console.log(pearsItem);
  </script>
</body>
</html>
